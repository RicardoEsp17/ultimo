<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gasolineras España - Ancho Fijo</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* 1. BLOQUEO DE ANCHO TOTAL */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow-x: hidden; /* Evita el scroll lateral */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f0f0;
        }

        .app-container {
            width: 100%;
            max-width: 480px; /* Ancho máximo fijo tipo móvil */
            margin: 0 auto;
            background: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden; /* Mantiene todo dentro del contenedor */
        }

        header {
            background: #222; color: white; padding: 12px; text-align: center;
            flex-shrink: 0; /* No se encoge */
        }

        /* Cuadrícula de combustible */
        .fuel-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 4px; padding: 10px; background: #fff; border-bottom: 1px solid #eee;
            flex-shrink: 0;
        }
        .fuel-column { display: flex; flex-direction: column; align-items: center; }
        .fuel-btn {
            width: 100%; padding: 10px 2px; border: none; border-radius: 6px;
            font-weight: bold; font-size: 0.7rem; color: white; opacity: 0.3;
            cursor: pointer; margin-bottom: 5px;
        }
        .fuel-btn.active { opacity: 1; }
        .btn-gas95 { background: #28a745; }
        .btn-dizel { background: #444; }
        .btn-dizel-plus { background: #dc3545; }

        .fuel-stats { text-align: center; width: 100%; }
        .avg-val { display: block; font-size: 0.9rem; font-weight: 800; }
        .details { font-size: 0.55rem; color: #777; line-height: 1.2; }

        /* 2. MAPA ESTABLE: Altura fija o flexible pero contenida */
        #map { 
            width: 100%; 
            height: 40vh; /* Ocupa el 40% de la pantalla */
            background: #eee;
            flex-shrink: 0;
            z-index: 1;
        }

        /* Lista con scroll interno */
        .list-container { 
            flex-grow: 1; /* Ocupa el resto del espacio */
            overflow-y: auto; /* Solo scroll vertical aquí */
            padding: 10px;
            background: #fafafa;
        }

        .gas-card {
            background: #333; color: white; padding: 10px; border-radius: 8px;
            margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
            border-left: 6px solid #ccc;
        }
        .gas-price { font-weight: bold; font-size: 1.1rem; }

        /* Colores */
        .c-verde { color: #5efc82 !important; }
        .c-amarillo { color: #ffeb3b !important; }
        .c-rojo { color: #ff5252 !important; }

        .custom-marker {
            background: white; border: 1.5px solid #222; border-radius: 3px;
            font-weight: bold; font-size: 10px; text-align: center;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header><strong>⛽ COMPARADOR FIJO</strong></header>

    <div class="fuel-grid">
        <div class="fuel-column">
            <button id="btn-gas95" class="fuel-btn btn-gas95 active" onclick="selectFuel(this, 'gas95')">Gas 95</button>
            <div class="fuel-stats">
                <span class="avg-val" id="avg-gas95">--</span>
                <div class="details" id="desc-gas95">Mat: --<br>I.H: 0.472<br>IVA: --</div>
            </div>
        </div>
        <div class="fuel-column">
            <button id="btn-dizel" class="fuel-btn btn-dizel" onclick="selectFuel(this, 'dizel')">Diésel</button>
            <div class="fuel-stats">
                <span class="avg-val" id="avg-dizel">--</span>
                <div class="details" id="desc-dizel">Mat: --<br>I.H: 0.379<br>IVA: --</div>
            </div>
        </div>
        <div class="fuel-column">
            <button id="btn-dizel-plus" class="fuel-btn btn-dizel-plus" onclick="selectFuel(this, 'dizel_plus')">Diésel +</button>
            <div class="fuel-stats">
                <span class="avg-val" id="avg-dizel_plus">--</span>
                <div class="details" id="desc-dizel_plus">Mat: --<br>I.H: 0.379<br>IVA: --</div>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <div class="list-container" id="lista-eess">
        <p style="text-align:center; font-size:0.8rem; color:#999;">Cargando datos...</p>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    let map = L.map('map', { 
        zoomControl: false, 
        preferCanvas: true,
        bounceAtZoomLimits: false // Evita efectos de rebote que ensanchan la página
    }).setView([40.41, -3.70], 6);
    
    let markersLayer = L.layerGroup().addTo(map);
    let datosCompletos = [];
    let tipoActual = 'gas95';

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    window.onload = () => {
        cargarDatos();
        setTimeout(() => map.invalidateSize(), 300);
    };

    async function cargarDatos() {
        try {
            const res = await fetch('https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/');
            const data = await res.json();
            datosCompletos = data.ListaEESSPrecio.filter(e => e['Tipo Venta'] === 'P');
            actualizarMedias();
            dibujarTodo();
        } catch (e) { console.error(e); }
    }

    function selectFuel(btn, id) {
        document.querySelectorAll('.fuel-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        tipoActual = id;
        dibujarTodo();
    }

    function actualizarMedias() {
        const config = {
            'gas95': { campo: 'Precio Gasolina 95 E5', ieh: 0.472 },
            'dizel': { campo: 'Precio Gasoleo A', ieh: 0.379 },
            'dizel_plus': { campo: 'Precio Gasoleo Premium', ieh: 0.379 }
        };
        Object.keys(config).forEach(id => {
            const item = config[id];
            let ps = datosCompletos.map(e => e[item.campo]).filter(p => p).map(p => parseFloat(p.replace(',', '.')));
            if (ps.length) {
                const media = ps.reduce((a, b) => a + b, 0) / ps.length;
                const iva = media - (media / 1.21);
                const mat = media - iva - item.ieh;
                document.getElementById(`avg-${id}`).innerText = media.toFixed(3);
                document.getElementById(`desc-${id}`).innerHTML = `Mat: ${mat.toFixed(3)}<br>I.H: ${item.ieh.toFixed(3)}<br>IVA: ${iva.toFixed(3)}`;
            }
        });
    }

    function dibujarTodo() {
        markersLayer.clearLayers();
        const listaDiv = document.getElementById('lista-eess');
        listaDiv.innerHTML = "";

        const bounds = map.getBounds();
        const zoom = map.getZoom();
        const campo = tipoActual === 'gas95' ? 'Precio Gasolina 95 E5' : (tipoActual === 'dizel' ? 'Precio Gasoleo A' : 'Precio Gasoleo Premium');

        let visibles = datosCompletos.filter(e => {
            if (!e[campo]) return false;
            const lat = parseFloat(e.Latitud.replace(',', '.'));
            const lon = parseFloat(e['Longitud (WGS84)'].replace(',', '.'));
            return bounds.contains([lat, lon]);
        });

        if (visibles.length === 0) return;

        const precios = visibles.map(e => parseFloat(e[campo].replace(',', '.')));
        const minP = Math.min(...precios);
        const maxP = Math.max(...precios);
        const rango = maxP - minP;

        visibles.sort((a, b) => parseFloat(a[campo].replace(',','.')) - parseFloat(b[campo].replace(',','.')));

        visibles.forEach((e, i) => {
            const p = parseFloat(e[campo].replace(',', '.'));
            const lat = parseFloat(e.Latitud.replace(',', '.'));
            const lon = parseFloat(e['Longitud (WGS84)'].replace(',', '.'));
            
            let color = "#ffeb3b"; 
            let clase = "c-amarillo";

            if (rango > 0) {
                const perc = (p - minP) / rango;
                if (perc < 0.25) { color = "#28a745"; clase = "c-verde"; }
                else if (perc > 0.75) { color = "#dc3545"; clase = "c-rojo"; }
            }

            if (zoom < 10) {
                L.circleMarker([lat, lon], {
                    radius: 4, fillColor: color, color: "#000", weight: 0.5, fillOpacity: 1
                }).addTo(markersLayer);
            } else {
                L.marker([lat, lon], {
                    icon: L.divIcon({
                        className: 'custom-marker',
                        html: `<span class="${clase}">${p.toFixed(3)}</span>`,
                        iconSize: [46, 16]
                    })
                }).addTo(markersLayer);
            }

            if (i < 50) {
                const card = document.createElement('div');
                card.className = 'gas-card';
                card.style.borderLeftColor = color;
                card.innerHTML = `
                    <div style="flex:1; overflow:hidden;">
                        <span style="font-weight:bold; font-size:0.8rem; display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${e['Rótulo']}</span>
                        <span style="font-size:0.6rem; color:#bbb;">${e['Dirección']}</span>
                    </div>
                    <div class="gas-price ${clase}">${p.toFixed(3)}</div>
                `;
                card.onclick = () => map.setView([lat, lon], 15);
                listaDiv.appendChild(card);
            }
        });
    }

    map.on('moveend', dibujarTodo);
</script>
</body>
</html>
